<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Điểm danh Thiếu Nhi</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div id="home" class="card">

<h1>
ĐIỂM DANH THIẾU NHI
<br>
GIÁO XỨ PHÚ HÒA
</h1>


<h2>
Chọn loại điểm danh
</h2>


<button onclick="startApp('Dự lễ')">
DỰ LỄ
</button>


<button onclick="startApp('Giáo lý')">
GIÁO LÝ
</button>


</div>




<div id="scannerBox" class="card hidden">


<h2 id="typeTitle"></h2>


<div id="reader"></div>


<button class="back"
onclick="backHome()">

ĐỔI LOẠI ĐIỂM DANH

</button>


</div>


</div>





<!-- POPUP KẾT QUẢ -->


<div id="overlay" class="hidden">


<div id="overlayCard">


<div id="overlayIcon">
✅
</div>


<div id="overlayTitle">
ĐIỂM DANH THÀNH CÔNG
</div>


<img id="overlayPhoto">


<div id="overlayName"></div>


<div id="overlayCode"></div>


<div id="overlayClass"></div>


<div id="overlayHint">

Chạm màn hình để tiếp tục

</div>


</div>


</div>





<script src="https://unpkg.com/html5-qrcode"></script>

<script src="app.js"></script>


</body>

</html>
