<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1">

    <title>

        Điểm danh Thiếu nhi Giáo xứ Phú Hòa

    </title>

    <!--==================================
    PWA
    ===================================-->

    <link
        rel="manifest"
        href="../manifest.json">

    <meta
        name="theme-color"
        content="#1565c0">

    <meta
        name="description"
        content="Hệ thống điểm danh Thiếu nhi Giáo xứ Phú Hòa">

    <meta
        name="mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default">

    <meta
        name="apple-mobile-web-app-title"
        content="Điểm danh QR">

    <link
        rel="icon"
        href="../icons/icon-192.png">

    <link
        rel="apple-touch-icon"
        href="../icons/icon-192.png">

    <!--==================================
    CSS
    ===================================-->

    <link
        rel="stylesheet"
        href="attendance.css">

</head>

<body>

    <!--==================================
    QUEUE
    ===================================-->

    <div id="queueBadge" class="queue-badge">

        📤

        <span id="queueCount">

            0

        </span>

    </div>

    <!--==================================
    CONTAINER
    ===================================-->

    <div class="container">

        <!--==============================
        HOME
        ==============================-->

        <div class="card home">

            <img

                class="logo"

                src="https://drive.google.com/uc?export=view&id=1pI05_C7SCHHwkGwZGNH47r6WcfZdwwlD"

                alt="Logo">

            <h1>

                GIÁO XỨ PHÚ HÒA

            </h1>

            <div class="subTitle">

                HỆ THỐNG ĐIỂM DANH QR

            </div>

            <button

                class="btn"

                onclick="AttendanceController.start(LOAI.LE)">

                DỰ LỄ

            </button>

            <button

                class="btn"

                onclick="AttendanceController.start(LOAI.GIAOLY)">

                GIÁO LÝ

            </button>

            <button

                id="installBtn"

                class="btn install hidden">

                CÀI ĐẶT ỨNG DỤNG

            </button>

        </div>

        <!--==============================
        SCANNER
        ==============================-->

        <div

            id="scannerBox"

            class="card hidden">

            <div id="typeTitle"></div>

            <div

                id="todayCount"

                class="todayCount">

                Đã điểm danh hôm nay: 0 em

            </div>

            <div id="reader"></div>

            <button

                class="back"

                onclick="CameraController.backHome()">

                QUAY LẠI

            </button>

        </div>

    </div>

    <!--==================================
    POPUP
    ===================================-->

    <div

        id="overlay"

        class="hidden">

        <div id="overlayCard">

            <div id="overlayTitle"></div>

            <img id="overlayPhoto">

            <div id="overlayName"></div>

            <div id="overlayKhoi"></div>

            <div id="overlayClass"></div>

            <div id="overlayCode"></div>

            <div id="overlayTime"></div>

            <div id="overlayHint"></div>

        </div>

    </div>

    <!--==================================
    DEBUG
    ===================================-->

    <div

        id="debugButton"

        class="hidden">

        🐞

    </div>

    <div

        id="debugPanel"

        class="hidden">

        <div id="debugHeader">

            Developer Console

        </div>

        <div id="debugContent"></div>

    </div>

    <!--==================================
    LIBRARY
    ===================================-->

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <!--==================================
    SYSTEM
    ===================================-->

    <script src="../system/version.js"></script>
    <script src="../system/config.js"></script>
    <script src="../system/constants.js"></script>
    <script src="../system/model.js"></script>
    <script src="../system/core.js"></script>
    <script src="../system/renderer.js"></script>
    <script src="../system/debug.js"></script>
    <script src="../system/utils.js"></script>
    <script src="../system/auth.js"></script>

    <!--==================================
    ATTENDANCE
    ===================================-->

    <script src="attendance.renderer.js"></script>
    <script src="attendance.service.js"></script>
    <script src="attendance.controller.js"></script>

    <script src="offline.js"></script>
    <script src="api.js"></script>

    <!--==================================
    CAMERA
    ===================================-->

    <script src="camera/camera.service.js"></script>
    <script src="camera/camera.controller.js"></script>

    <!--==================================
    POPUP
    ===================================-->

    <script src="popup/popup.renderer.js"></script>
    <script src="popup/popup.service.js"></script>

    <!--==================================
    APP
    ===================================-->

    <script src="app.js"></script>

</body>

</html>
