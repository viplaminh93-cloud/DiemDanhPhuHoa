<!DOCTYPE html>

<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1">

    <title>

        Điểm danh QR

    </title>

    <link
        rel="stylesheet"
        href="../css/style.css">

</head>

<body>

    <!--======================================
        Badge Offline Queue
    =======================================-->

    <div
        id="queueBadge"
        class="queue-badge">

        📤
        <span id="queueCount">

            0

        </span>

    </div>


    <div class="container">

        <!--======================================
            HOME
        =======================================-->

        <div class="card home">

            <img
                class="logo"
                src="https://drive.google.com/uc?export=view&id=1pI05_C7SCHHwkGwZGNH47r6WcfZdwwlD">

            <h1>

                GIÁO XỨ PHÚ HÒA

            </h1>

            <div class="subTitle">

                HỆ THỐNG ĐIỂM DANH QR

            </div>

            <button
                id="btnMass"
                class="btn">

                DỰ LỄ

            </button>

            <button
                id="btnCatechism"
                class="btn">

                GIÁO LÝ

            </button>

            <button
                id="installBtn"
                class="btn install hidden">

                CÀI ĐẶT ỨNG DỤNG

            </button>

        </div>



        <!--======================================
            SCANNER
        =======================================-->

        <div
            id="scannerBox"
            class="card hidden">

            <div
                id="typeTitle">

            </div>

            <div
                id="todayCount"
                class="todayCount">

                Đã điểm danh hôm nay:
                <b>0</b>

            </div>

            <div
                id="reader">

            </div>

            <button
                id="btnBack"
                class="back">

                QUAY LẠI

            </button>

        </div>

    </div>



    <!--======================================
        POPUP
    =======================================-->

    <div
        id="overlay"
        class="hidden">

        <div id="overlayCard">

            <div id="overlayTitle">

            </div>

            <img id="overlayPhoto">

            <div id="overlayName"></div>

            <div id="overlayKhoi"></div>

            <div id="overlayClass"></div>

            <div id="overlayCode"></div>

            <div id="overlayTime"></div>

            <div id="overlayHint">

                Chạm màn hình để tiếp tục

            </div>

        </div>

    </div>



    <!--======================================
        DEBUG
    =======================================-->

    <div
        id="debugButton"
        class="hidden">

        🐞

    </div>

    <div
        id="debugPanel"
        class="hidden">

        <div id="debugHeader">

            Developer Console

        </div>

        <div id="debugContent"></div>

    </div>



    <!--======================================
        LIBRARY
    =======================================-->

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>



    <!--======================================
        SYSTEM
    =======================================-->

    <script src="../system/version.js"></script>

    <script src="../system/config.js"></script>

    <script src="../system/constants.js"></script>

    <script src="../system/core.js"></script>

    <script src="../system/model.js"></script>

    <script src="../system/utils.js"></script>

    <script src="../system/debug.js"></script>

    <script src="../system/auth.js"></script>

    <script src="../system/offline.js"></script>

    <script src="../system/camera.js"></script>

    <script src="../system/api.js"></script>

    <script src="../system/popup.js"></script>



    <!--======================================
        ATTENDANCE MODULE
    =======================================-->

    <script src="attendance.service.js"></script>

    <script src="attendance.renderer.js"></script>

    <script src="attendance.controller.js"></script>

</body>

</html>
